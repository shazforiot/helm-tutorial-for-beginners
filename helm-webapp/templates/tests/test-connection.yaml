apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "helm-webapp.fullname" . }}-test-connection"
  labels:
    {{- include "helm-webapp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - '--spider'
        - '--timeout=10'
        - 'http://{{ include "helm-webapp.fullname" . }}:{{ .Values.service.port }}/'
  restartPolicy: Never
