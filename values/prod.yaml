# ── Production Environment Overrides ────────────────────────
replicaCount: 3

image:
  tag: "1.25-alpine"   # Always pin to a specific tag in production!
  pullPolicy: Always

service:
  type: LoadBalancer

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myapp-tls
      hosts:
        - myapp.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

env:
  - name: APP_ENV
    value: "production"
  - name: LOG_LEVEL
    value: "warn"
